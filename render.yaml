databases:
  - name: smashbox-db
    databaseName: smashbox
    user: smashbox_admin
    plan: free
    region: oregon

services:
  - type: web
    name: smashbox
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install && pnpm db:generate && pnpm --filter @gym/web build
    startCommand: pnpm --filter @gym/web start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: smashbox-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_ENV
        value: production
