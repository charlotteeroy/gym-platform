databases:
  - name: smashbox-db
    databaseName: smashbox
    user: smashbox_admin
    plan: free
    region: oregon

services:
  - type: web
    name: smashbox
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      corepack enable &&
      corepack prepare pnpm@8.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm db:generate &&
      pnpm db:push &&
      pnpm build
    startCommand: npm --prefix apps/web run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: smashbox-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_ENV
        value: production
